version: 2
updates:
  # ── Python dependencies ─────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Yashaswini-V21"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      fastapi-stack:
        patterns: ["fastapi*", "uvicorn*", "pydantic*", "starlette*"]
      ml-stack:
        patterns: ["torch*", "transformers*", "scikit-learn*", "numpy*", "pandas*"]
      redis-stack:
        patterns: ["redis*", "celery*"]

  # ── npm / frontend dependencies ────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "Yashaswini-V21"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      react-ecosystem:
        patterns: ["react*", "@types/react*"]
      build-tools:
        patterns: ["vite*", "@vitejs/*", "typescript*", "eslint*"]
      charting:
        patterns: ["recharts*"]

  # ── GitHub Actions dependencies ────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    reviewers:
      - "Yashaswini-V21"
    labels:
      - "dependencies"
      - "ci-cd"
    commit-message:
      prefix: "ci(deps)"

  # ── Docker base image updates ───────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(deps)"
