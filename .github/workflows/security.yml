name: Security Scanning

on:
  push:
    branches: [ main, develop, completed ]
  pull_request:
    branches: [ main, develop, completed ]
  schedule:
    # Run every Monday at 8 AM UTC
    - cron: '0 8 * * 1'

jobs:
  # Note: CodeQL Static Analysis is available for public repos or repos with
  # GitHub Advanced Security enabled. It has been removed from this workflow
  # because it cannot upload SARIF results on private repos without that license,
  # causing misleading red checks on PRs.

  # ──────────────────────────────────────────────────────────────────────────
  # Trivy — Container Vulnerability Scanning
  # ──────────────────────────────────────────────────────────────────────────
  trivy-backend:
    name: Trivy Scan (Backend Docker Image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build backend Docker image for scanning
      run: |
        docker build -t moodmarket-backend:scan -f docker/Dockerfile . || \
        echo "Dockerfile not found, scanning filesystem instead"

    - name: Trivy filesystem scan (Python deps)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        scanners: 'vuln,secret'
        severity: 'HIGH,CRITICAL'
        format: 'sarif'
        output: 'trivy-backend.sarif'
        exit-code: '0'   # Non-blocking — report only
        ignore-unfixed: true

    - name: Upload Trivy SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-backend.sarif'
        category: 'trivy-backend'
      continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # npm audit — Frontend Dependency Audit
  # ──────────────────────────────────────────────────────────────────────────
  npm-audit:
    name: npm Dependency Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: Run npm audit (high+ severity)
      run: |
        cd frontend
        npm audit --audit-level=high --json > npm-audit.json || true
        cat npm-audit.json
      continue-on-error: true

    - name: Upload npm audit results
      uses: actions/upload-artifact@v4
      with:
        name: npm-audit-results
        path: frontend/npm-audit.json
      if: always()

  # ──────────────────────────────────────────────────────────────────────────
  # pip-audit — Python Dependency Audit
  # ──────────────────────────────────────────────────────────────────────────
  pip-audit:
    name: pip Dependency Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Run pip-audit on CI requirements
      run: |
        pip-audit -r requirements-ci.txt --format json -o pip-audit.json || true
        cat pip-audit.json || echo "No output"
      continue-on-error: true

    - name: Upload pip-audit results
      uses: actions/upload-artifact@v4
      with:
        name: pip-audit-results
        path: pip-audit.json
      if: always()

  # ──────────────────────────────────────────────────────────────────────────
  # Secret Scanning — Gitleaks
  # ──────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
