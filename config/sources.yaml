# Ingestion sources configurations and scheduling properties

sources:
  reddit:
    subreddits:
      - wallstreetbets
      - stocks
      - investing
    fetch_interval_minutes: 15
    limit_posts_per_interval: 100
    error_threshold_failures: 5

  news:
    keywords:
      - financial
      - stock
      - earnings
      - merger
      - regulatory
    tickers:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - NVDA
    fetch_interval_minutes: 5
    limit_articles_per_interval: 50
    error_threshold_failures: 3

  price:
    tickers:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - NVDA
    fetch_interval_minutes: 15  # standard candle width
    realtime_fallback_seconds: 60
    error_threshold_failures: 4

  trends:
    fetch_interval_minutes: 60
    resolution: hourly
    error_threshold_failures: 2
