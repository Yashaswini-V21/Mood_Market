<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050d"/>
      <stop offset="50%" stop-color="#0c071d"/>
      <stop offset="100%" stop-color="#140628"/>
    </linearGradient>

    <!-- MOOD Word Gradient (Warm/Magenta to Purple) -->
    <linearGradient id="mood-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2a85"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Accent Lines Gradient -->
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00f2fe" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop Shadow Filter for Depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.7"/>
    </filter>

    <!-- Glow Filter for Neon Effect -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- Top Accent Bar -->
  <rect x="0" y="0" width="900" height="3" fill="url(#line)"/>

  <!-- Subtle grid pattern in the background (very low opacity for depth) -->
  <g opacity="0.025">
    <path d="M 0,20 L 900,20 M 0,40 L 900,40 M 0,60 L 900,60 M 0,80 L 900,80 M 0,100 L 900,100 M 0,120 L 900,120 M 0,140 L 900,140 M 0,160 L 900,160 M 0,180 L 900,180 M 0,200 L 900,200" stroke="#ffffff" stroke-width="0.5"/>
    <path d="M 50,0 L 50,220 M 100,0 L 100,220 M 150,0 L 150,220 M 200,0 L 200,220 M 250,0 L 250,220 M 300,0 L 300,220 M 350,0 L 350,220 M 400,0 L 400,220 M 450,0 L 450,220 M 500,0 L 500,220 M 550,0 L 550,220 M 600,0 L 600,220 M 650,0 L 650,220 M 700,0 L 700,220 M 750,0 L 750,220 M 800,0 L 800,220 M 850,0 L 850,220" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Faint Background Icons -->
  <text x="90" y="120" font-size="44" text-anchor="middle" opacity="0.05" font-family="sans-serif">🧠</text>
  <text x="810" y="120" font-size="44" text-anchor="middle" opacity="0.05" font-family="sans-serif">📈</text>

  <!-- Centered Logo Icon / Node Trend -->
  <g transform="translate(435, 22)">
    <!-- Inner glowing trend -->
    <path d="M 0,18 L 10,8 L 20,14 L 30,2" fill="none" stroke="url(#mood-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="18" r="2.5" fill="#ff2a85"/>
    <circle cx="10" cy="8" r="2.5" fill="#a855f7"/>
    <circle cx="20" cy="14" r="2.5" fill="#a855f7"/>
    <circle cx="30" cy="2" r="3.5" fill="#00f2fe" filter="url(#neon-glow)"/>
  </g>

  <!-- Main Title "MOOD MARKET" with shadow & neon glow -->
  <g filter="url(#shadow)">
    <text
      x="450" y="112"
      text-anchor="middle"
      font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
      font-size="62" font-weight="900" letter-spacing="6">
      <!-- MOOD: Filled vibrant gradient -->
      <tspan fill="url(#mood-grad)">MOOD</tspan>
      <!-- MARKET: Solid White -->
      <tspan fill="#ffffff" dx="14">MARKET</tspan>
    </text>
  </g>

  <!-- Divider -->
  <rect x="240" y="132" width="420" height="1.5" fill="url(#line)"/>

  <!-- Subtitle -->
  <text
    x="450" y="162"
    text-anchor="middle"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="12.5" letter-spacing="4" fill="#a78bfa" opacity="0.9">
    AI · SENTIMENT · FORECAST · ANOMALY DETECTION
  </text>

  <!-- Tagline -->
  <text
    x="450" y="190"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="12" letter-spacing="1.2" fill="#9ca3af">
    Where sentiment meets alpha — before the market moves
  </text>

  <!-- Bottom Accent Bar -->
  <rect x="0" y="217" width="900" height="3" fill="url(#line)"/>
</svg>
